<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Introspect — Codebase Knowledge Graph</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* ─── MODERN DESIGN SYSTEM & TOKENS ─── */
    :root {
      --bg: #090b11;
      --surface-glass: rgba(18, 22, 35, 0.7);
      --border-glass: rgba(255, 255, 255, 0.08);
      --border-active: rgba(124, 106, 255, 0.4);
      --text: #f1f5f9;
      --muted: #94a3b8;
      
      /* Vibrant Tailored HSL Accents */
      --primary: #7c6aff;
      --primary-glow: rgba(124, 106, 255, 0.25);
      
      --sky: #38bdf8;
      --sky-glow: rgba(56, 189, 248, 0.25);
      
      --indigo: #6366f1;
      --indigo-glow: rgba(99, 102, 241, 0.25);
      
      --violet: #8b5cf6;
      --violet-glow: rgba(139, 92, 246, 0.25);
      
      --emerald: #10b981;
      --emerald-glow: rgba(16, 185, 129, 0.25);
      
      --pink: #ec4899;
      --pink-glow: rgba(236, 72, 153, 0.25);
      
      --amber: #f59e0b;
      --amber-glow: rgba(245, 158, 11, 0.25);

      --red: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── GLOWING DECORATIVE BACKGROUND ─── */
    .bg-glowing-blob {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 106, 255, 0.08) 0%, rgba(9, 11, 17, 0) 70%);
      top: -150px;
      left: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glowing-blob-right {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.05) 0%, rgba(9, 11, 17, 0) 70%);
      bottom: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER BAR ─── */
    header {
      background: rgba(9, 11, 17, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-glass);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-badge {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      box-shadow: 0 0 15px var(--primary-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
    }

    .logo-text h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .search-filter-area {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 450px;
    }

    .search-box {
      position: relative;
      flex-grow: 1;
    }

    .search-box input {
      width: 100%;
      background: rgba(13, 17, 28, 0.8);
      border: 1px solid var(--border-glass);
      border-radius: 8px;
      padding: 10px 16px 10px 38px;
      color: var(--text);
      font-size: 0.85rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(124, 106, 255, 0.2);
    }

    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-box input:focus + svg {
      color: var(--primary);
    }

    /* ─── MAIN DASHBOARD SPLIT ─── */
    main {
      flex-grow: 1;
      display: flex;
      height: calc(100vh - 78px);
      position: relative;
      z-index: 10;
    }

    /* ─── LEFT: GRAPH PANEL ─── */
    .graph-panel {
      flex: 3;
      position: relative;
      border-right: 1px solid var(--border-glass);
      background: radial-gradient(circle at center, rgba(16, 20, 36, 0.4) 0%, rgba(9, 11, 17, 0.7) 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .graph-header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      background: rgba(9, 11, 17, 0.2);
    }

    .graph-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .graph-instructions {
      font-size: 0.72rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid var(--border-glass);
    }

    .svg-container {
      flex-grow: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      user-select: none;
    }

    svg.network-graph {
      width: 100%;
      height: 100%;
    }

    /* ─── SVG STYLING & ANIMATIONS ─── */
    .connector-path {
      fill: none;
      stroke: #1e293b;
      stroke-width: 2.5;
      transition: all 0.3s ease;
      stroke-dasharray: 4 2;
    }

    .connector-path.flow-active {
      stroke: var(--primary);
      stroke-width: 3;
      stroke-dasharray: none;
      filter: drop-shadow(0 0 6px var(--primary-glow));
    }

    .connector-path.flow-hovered {
      stroke: var(--sky);
      stroke-width: 3.5;
      stroke-dasharray: none;
      filter: drop-shadow(0 0 8px var(--sky-glow));
    }

    .connector-arrow {
      fill: #1e293b;
      transition: fill 0.3s;
    }

    .connector-path.flow-active + marker .connector-arrow {
      fill: var(--primary);
    }

    /* Glowing Node Styles */
    .node-group {
      cursor: pointer;
      outline: none;
    }

    .node-bg {
      fill: rgba(13, 17, 28, 0.85);
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 2.5;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .node-group:hover .node-bg {
      stroke: var(--hover-color, var(--primary));
      fill: rgba(20, 24, 38, 0.95);
      transform: scale(1.05);
      transform-origin: var(--cx) var(--cy);
      filter: drop-shadow(0 0 12px var(--glow-color, var(--primary-glow)));
    }

    .node-group.node-active .node-bg {
      stroke: var(--hover-color, var(--primary));
      fill: rgba(30, 36, 58, 0.95);
      stroke-width: 3.5;
      transform: scale(1.08);
      transform-origin: var(--cx) var(--cy);
      filter: drop-shadow(0 0 16px var(--glow-color, var(--primary-glow)));
    }

    .node-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      fill: var(--text);
      letter-spacing: 0.02em;
      transition: fill 0.2s;
      pointer-events: none;
      text-anchor: middle;
    }

    .node-sublabel {
      font-family: 'Inter', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      fill: var(--muted);
      transition: fill 0.2s;
      pointer-events: none;
      text-anchor: middle;
    }

    .node-group:hover .node-label {
      fill: #fff;
    }

    .node-group.node-active .node-label {
      fill: #fff;
    }

    .node-icon {
      fill: var(--muted);
      transition: fill 0.2s;
      pointer-events: none;
    }

    .node-group:hover .node-icon {
      fill: var(--hover-color, var(--primary));
    }

    .node-group.node-active .node-icon {
      fill: var(--hover-color, var(--primary));
    }

    /* ─── LEGEND BAR ─── */
    .legend-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: var(--surface-glass);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-glass);
      padding: 12px 18px;
      border-radius: 12px;
      display: flex;
      gap: 16px;
      font-size: 0.72rem;
      pointer-events: auto;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ─── RIGHT: ARTICLE WIKI PANEL ─── */
    .wiki-panel {
      flex: 2;
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 420px;
      transition: all 0.3s ease;
    }

    .wiki-nav {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      background: rgba(9, 11, 17, 0.3);
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border-glass);
      padding: 6px 12px;
      border-radius: 16px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text);
    }

    .nav-btn.nav-active {
      background: var(--primary-glow);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 0 10px rgba(124, 106, 255, 0.1);
    }

    .wiki-scroller {
      flex-grow: 1;
      overflow-y: auto;
      padding: 32px;
      scroll-behavior: smooth;
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* ─── ARTICLE STYLING ─── */
    .article-container {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .article-container.fade-out {
      opacity: 0;
      transform: translateY(10px);
    }

    .article-header-chip {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--accent-glow, var(--primary-glow));
      border: 1px solid var(--accent-color, var(--primary));
      color: #fff;
      margin-bottom: 12px;
    }

    .article-container h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .article-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .article-divider {
      height: 1px;
      background: linear-gradient(to right, var(--border-glass), transparent);
      margin: 24px 0;
    }

    /* Markdown Element Styles */
    .wiki-content p {
      font-size: 0.88rem;
      line-height: 1.65;
      color: #cbd5e1;
      margin-bottom: 16px;
    }

    .wiki-content h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin: 24px 0 10px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wiki-content ul, .wiki-content ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }

    .wiki-content li {
      font-size: 0.88rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .wiki-content strong {
      color: #fff;
      font-weight: 600;
    }

    /* Callout Alert */
    .wiki-callout {
      background: rgba(124, 106, 255, 0.08);
      border-left: 3px solid var(--primary);
      border-radius: 8px;
      padding: 14px 18px;
      margin: 20px 0;
    }
    
    .wiki-callout.alert-warning {
      background: rgba(245, 158, 11, 0.06);
      border-left-color: var(--amber);
    }

    .wiki-callout-title {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .wiki-callout p {
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--muted);
      margin-bottom: 0;
    }

    /* Inline Code */
    .wiki-content code {
      font-family: 'Fira Code', monospace;
      font-size: 0.78rem;
      background: #0d1117;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      padding: 2px 6px;
      color: #7dd3fc;
    }

    /* Preformatted Code Blocks */
    .wiki-content pre {
      background: #0b0d16;
      border: 1px solid var(--border-glass);
      border-radius: 10px;
      padding: 16px;
      margin: 18px 0;
      overflow-x: auto;
    }

    .wiki-content pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 0.78rem;
      line-height: 1.5;
      color: #e2e8f0;
      display: block;
    }

    /* Code Highlighting Mock Styles */
    .keyword { color: #f472b6; font-weight: 600; }
    .string { color: #34d399; }
    .comment { color: #64748b; font-style: italic; }
    .number { color: #fbbf24; }
    .type { color: #38bdf8; }
    .fn { color: #818cf8; }

    /* Schema Table */
    .wiki-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin: 16px 0;
      background: rgba(13, 17, 28, 0.4);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-glass);
    }

    .wiki-table th {
      text-align: left;
      padding: 10px 14px;
      background: rgba(9, 11, 17, 0.6);
      border-bottom: 2px solid var(--border-glass);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .wiki-table td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: #cbd5e1;
      vertical-align: top;
    }

    .wiki-table tr:last-child td {
      border-bottom: none;
    }

    .pk-badge {
      color: #fbbf24 !important;
      font-weight: 700;
    }

    .fk-badge {
      color: #a78bfa !important;
    }

    /* Search Highlight */
    .highlight-match {
      background: rgba(245, 158, 11, 0.25);
      border-bottom: 1px solid var(--amber);
      color: #fff;
      border-radius: 2px;
      padding: 0 1px;
    }

    .no-results {
      padding: 40px;
      text-align: center;
      color: var(--muted);
    }
    
    .no-results svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      main {
        flex-direction: column;
        height: auto;
      }
      .graph-panel {
        height: 500px;
        border-right: none;
        border-bottom: 1px solid var(--border-glass);
      }
      .wiki-panel {
        height: 600px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-glowing-blob"></div>
  <div class="bg-glowing-blob-right"></div>

  <!-- ═══════════════════════════════════════════
       HEADER BAR
       ═══════════════════════════════════════════ -->
  <header>
    <div class="logo-area">
      <div class="logo-badge">I</div>
      <div class="logo-text">
        <h1>Introspect Wiki</h1>
        <p>Interactive Codebase Knowledge Base</p>
      </div>
    </div>
    
    <div class="search-filter-area">
      <div class="search-box">
        <input type="text" id="wiki-search" placeholder="Search schemas, routers, workflows, code...">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN APPLICATION LAYOUT
       ═══════════════════════════════════════════ -->
  <main>
    
    <!-- LEFT: NETWORK NODE GRAPH -->
    <div class="graph-panel">
      <div class="graph-header">
        <div class="graph-title">
          <svg style="width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2;" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94-3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"></path>
          </svg>
          Interactive Codebase Topology
        </div>
        <div class="graph-instructions">Click nodes to read articles</div>
      </div>
      
      <div class="svg-container">
        <svg class="network-graph" viewBox="0 0 950 500" xmlns="http://www.w3.org/2000/svg">
          <!-- Definitions for markers and filters -->
          <defs>
            <filter id="glow-primary" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="6" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
            
            <marker id="arrow-default" markerWidth="6" markerHeight="6" refX="28" refY="3" orient="auto">
              <path d="M0,0 L6,3 L0,6 Z" class="connector-arrow" />
            </marker>
          </defs>

          <!-- CONNECTING PATHS (BEZIER CURVES) -->
          <!-- Client -> tRPC Hooks -->
          <path id="path-client-hooks" d="M 120 250 C 145 250, 155 250, 180 250" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- Hooks -> Route Handler -->
          <path id="path-hooks-api" d="M 260 250 C 290 250, 310 160, 340 160" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- Hooks -> RSC Caller -->
          <path id="path-hooks-rsc" d="M 260 250 C 290 250, 310 340, 340 340" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- Route Handler -> Context -->
          <path id="path-api-context" d="M 420 160 C 450 160, 460 250, 480 250" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- RSC Caller -> Context -->
          <path id="path-rsc-context" d="M 420 340 C 450 340, 460 250, 480 250" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- Context -> Routers -->
          <path id="path-context-routers" d="M 560 250 C 585 250, 595 250, 620 250" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- Routers -> Database -->
          <path id="path-routers-db" d="M 700 250 C 730 250, 740 170, 770 170" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- Routers -> AI -->
          <path id="path-routers-ai" d="M 700 250 C 730 250, 740 330, 770 330" class="connector-path" marker-end="url(#arrow-default)" />
          
          <!-- Dev Workflows -> Context (floating reference) -->
          <path id="path-dev-context" d="M 490 100 C 490 130, 490 180, 490 210" class="connector-path" style="stroke-dasharray: 2 4;" />

          
          <!-- INTERACTIVE NODE GROUPS -->
          
          <!-- Node 1: Browser Client -->
          <g id="node-client" class="node-group" onclick="selectNode('architecture')" data-article="architecture" style="--hover-color: var(--sky); --glow-color: var(--sky-glow); --cx: 80px; --cy: 250px;">
            <rect x="40" y="210" width="80" height="80" rx="14" class="node-bg" />
            <!-- Laptop SVG Icon -->
            <path class="node-icon" d="M52 230 h56 v26 h-56 z M48 258 h64 v4 h-64 z" />
            <text x="80" y="272" class="node-label">Client UI</text>
            <text x="80" y="282" class="node-sublabel">React 19 / TW</text>

  <span class="keyword">const</span> result = <span class="keyword">await</span> <span class="fn">next</span>();
  console.<span class="fn">log</span>(<span class="string">\`[TRPC] \${path} took \${Date.now() - start}ms\`</span>);
  <span class="keyword">return</span> result;
});</code></pre>

          <pre><code>npm run dev <span class="comment"># Spin up local hot-reloaded local server</span></code></pre>

          <p><strong>4. Production Packaging:</strong></p>
          <pre><code>npm run build <span class="comment"># Run strict type checking and bundle JS assets</span></code></pre>
        `
      }
    };

    // ─── ACTIVE NODE & PATH SELECTOR ───
    let currentArticleId = "architecture";

    function selectNode(articleId) {
      if (!articles[articleId]) return;
      currentArticleId = articleId;

      // Update Wiki Navigation Active Tab
      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.classList.remove("nav-active");
      });
      const activeTab = document.getElementById("tab-" + articleId);
      if (activeTab) activeTab.classList.add("nav-active");

      // Update SVG Node Active State
      document.querySelectorAll(".node-group").forEach(node => {
        node.classList.remove("node-active");
      });
      
      // Update SVG Path Highlight Flow
      document.querySelectorAll(".connector-path").forEach(path => {
        path.classList.remove("flow-active");
      });

      const data = articles[articleId];
      
      // Highlight associated nodes
      if (data.nodes) {
        data.nodes.forEach(nodeId => {
          const el = document.getElementById(nodeId);
          if (el) el.classList.add("node-active");
        });
      }
      
      // Highlight associated paths
      if (data.paths) {
        data.paths.forEach(pathId => {
          const el = document.getElementById(pathId);
          if (el) el.classList.add("flow-active");
        });
      }

      // Transition Content (Fade-Out and Slide-In)
      const contentContainer = document.getElementById("article-content");
      contentContainer.classList.add("fade-out");
      
      setTimeout(() => {
        // Build rich HTML output
        contentContainer.style.setProperty("--accent-color", data.color);
        contentContainer.style.setProperty("--accent-glow", data.glow);
        
        let html = `
          <span class="article-header-chip">${data.chip}</span>
          <h2>${data.title}</h2>
          <p class="article-subtitle">${data.subtitle}</p>
          <div class="article-divider"></div>
          <div class="wiki-content">
            ${data.content}
          </div>
        `;
        
        contentContainer.innerHTML = html;
        
        // Highlight keyword simulations inside code tags
        highlightCodeSnippets(contentContainer);

        contentContainer.classList.remove("fade-out");
        
        // Scroll wiki panel back to top
        document.getElementById("wiki-scroller").scrollTop = 0;
      }, 200);
    }

    // ─── MINI REGEX SYNTAX HIGHLIGHTER ───
    function highlightCodeSnippets(container) {
      const codes = container.querySelectorAll("pre code");
      codes.forEach(code => {
        let text = code.innerHTML;
        
        // Replace syntax characters
        text = text.replace(/\b(const|let|var|function|return|export|import|from|as|import|select|from|default|export|type|isDev|ZodError)\b/g, '<span class="keyword">$1</span>');
        text = text.replace(/\b(z|entries|habits|nudges|zodError|timingMiddleware|ctx|db|publicProcedure|createTRPCContext|client|globalForDb|createTRPCRouter|appRouter|AppRouter)\b/g, '<span class="type">$1</span>');
        text = text.replace(/\b(useQuery|useMutation|mutate|query|createClient|drizzle|middleware|next|queryClient|generateObject|generateText|select|from)\b/g, '<span class="fn">$1</span>');
        text = text.replace(/("[^"]*"|'[^']*'|`[^`]*`)/g, '<span class="string">$1</span>');
        text = text.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
        text = text.replace(/(\/\/.*|\/\*[\s\S]*?\*\/|#.*)/g, '<span class="comment">$1</span>');
        
        code.innerHTML = text;
      });
    }

    // ─── LIVE GLOBAL SEARCH ───
    const searchInput = document.getElementById("wiki-search");
    
    searchInput.addEventListener("input", function(e) {
      const query = e.target.value.toLowerCase().trim();
      
      // If search is cleared, restore active article
      if (!query) {
        selectNode(currentArticleId);
        return;
      }
      
      // Reset node highlights
      document.querySelectorAll(".node-group").forEach(n => n.classList.remove("node-active"));
      document.querySelectorAll(".connector-path").forEach(p => p.classList.remove("flow-active"));
      
      let matchedArticles = [];
      let searchBody = "";

      for (const [id, data] of Object.entries(articles)) {
        const textToSearch = (data.title + " " + data.subtitle + " " + data.content + " " + data.chip).toLowerCase();
        
        if (textToSearch.includes(query)) {
          matchedArticles.push(id);
          
          // Highlight nodes matching query
          data.nodes.forEach(nodeId => {
            const el = document.getElementById(nodeId);
            if (el) el.classList.add("node-active");
          });
          
          // Trace path routes
          data.paths.forEach(pathId => {
            const el = document.getElementById(pathId);
            if (el) el.classList.add("flow-hovered");
          });
        } else {
          data.paths.forEach(pathId => {
            const el = document.getElementById(pathId);
            if (el) el.classList.remove("flow-hovered");
          });
        }
      }

      // Compile search results view
      const contentContainer = document.getElementById("article-content");
      
      if (matchedArticles.length === 0) {
        contentContainer.innerHTML = `
          <div class="no-results">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p>No results found for "<strong>${escapeHtml(query)}</strong>"</p>
            <p style="font-size: 0.78rem; margin-top: 8px;">Try searching for keywords like "SQLite", "tRPC", "Zod", "latency" or "branching".</p>
          </div>
        `;
        return;
      }

      // Compile combined results preview
      let combinedHtml = `
        <span class="article-header-chip" style="--accent-color: var(--amber); --accent-glow: var(--amber-glow)">Search Engine</span>
        <h2>Search Results for "${escapeHtml(query)}"</h2>
        <p class="article-subtitle">Found ${matchedArticles.length} matching sections in the knowledge base.</p>
        <div class="article-divider"></div>
      `;

      matchedArticles.forEach(id => {
        const data = articles[id];
        // Highlight matched text
        let snippet = data.subtitle;
        snippet = highlightText(snippet, query);
        
        combinedHtml += `
          <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); border-radius: 12px; padding: 18px; margin-bottom: 16px; cursor: pointer; transition: transform 0.2s, border-color 0.2s;" 
               onclick="selectNode('${id}'); document.getElementById('wiki-search').value = '';"
               onmouseover="this.style.borderColor='var(--primary)';"
               onmouseout="this.style.borderColor='var(--border-glass)';">
            <span class="article-header-chip" style="margin-bottom: 6px; font-size: 0.58rem; --accent-color: ${data.color}; --accent-glow: ${data.glow}">${data.chip}</span>
            <h3 style="margin-top: 4px; font-size: 1rem; color: #fff;">${highlightText(data.title, query)}</h3>
            <p style="font-size: 0.8rem; color: var(--muted); margin: 6px 0 0 0; line-height: 1.4;">${snippet}</p>
          </div>
        `;
      });

      contentContainer.innerHTML = combinedHtml;
    });

    // ─── SEARCH HIGHLIGHT UTILS ───
    function escapeHtml(string) {
      return String(string).replace(/[&<>"'`=\/]/g, function (s) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
          '/': '&#x2F;',
          '=': '&#x3D;',
          '`': '&#x60;'
        }[s];
      });
    }

    function highlightText(text, keyword) {
      if (!keyword) return text;
      const regex = new RegExp(`(${escapeRegExp(keyword)})`, 'gi');
      return text.replace(regex, '<span class="highlight-match">$1</span>');
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // ─── INITIALIZATION ON MOUNT ───
    window.addEventListener("DOMContentLoaded", () => {
      selectNode("architecture");
      
      // Node Graph Hover Traces
      document.querySelectorAll(".node-group").forEach(node => {
        node.addEventListener("mouseenter", () => {
          const articleId = node.getAttribute("data-article");
          if (!articleId || !articles[articleId]) return;
          
          const data = articles[articleId];
          if (data.paths) {
            data.paths.forEach(pathId => {
              const el = document.getElementById(pathId);
              if (el && !el.classList.contains("flow-active")) {
                el.classList.add("flow-hovered");
              }
            });
          }
        });

        node.addEventListener("mouseleave", () => {
          document.querySelectorAll(".connector-path").forEach(path => {
            path.classList.remove("flow-hovered");
          });
        });
      });
    });
  </script>
</body>
</html>
